name: Build LocalAI for macOS 12.7.6 (Intel)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-localai-intel:
    runs-on: macos-12
    strategy:
      matrix:
        go-version: ['1.20', '1.21']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
        cache: false
        
    - name: Display Go version
      run: go version
      
    - name: Install dependencies
      run: |
        # Install required dependencies
        brew install protobuf grpc-tools make cmake libomp llvm
        
        # Verify installation
        protoc --version
        cmake --version
        
    - name: Build LocalAI for Intel macOS
      run: |
        # Set build environment for Intel Mac
        export CGO_ENABLED=0
        export GOOS=darwin
        export GOARCH=amd64
        export GOAMD64=v1
        
        # Build LocalAI
        make protogen-go
        make build-localai
        
        # Verify the build
        ls -la localai
        file localai
        ./localai --version
        
    - name: Create distribution package
      run: |
        # Create a simple distribution
        mkdir -p dist
        cp localai dist/
        cp README.md dist/
        
        # Create installation script
        cat > dist/install.sh << 'EOF'
#!/bin/bash
echo "Installing LocalAI for macOS 12.7.6 (Intel)..."
mkdir -p /usr/local/bin
cp localai /usr/local/bin/
chmod +x /usr/local/bin/localai
echo "LocalAI installed successfully!"
echo "Run: localai --help"
EOF
        
        chmod +x dist/install.sh
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: localai-macos12-intel
        path: dist/
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.0-macos12-intel
        name: LocalAI for macOS 12.7.6 Intel
        body: |
          LocalAI编译版本，专为macOS 12.7.6 Monterey设计
          
          兼容性：
          - macOS 12.7.6 Monterey
          - Intel i5-4590t CPU
          - 架构：amd64 (Intel 64位)
          
          编译信息：
          - 基于LocalAI最新源码
          - Go版本：${{ matrix.go-version }}
          - 禁用了macOS 15+特性
          - 自动解决依赖库兼容性
          
          安装方法：
          1. 下载localai可执行文件
          2. 运行: sudo cp localai /usr/local/bin/
          3. 运行: localai --help
          
          注意：此版本为适配版本，可能无法使用最新特性
        files: dist/*
        draft: false
        prerelease: false
        generate_release_notes: true

  build-backends-intel:
    runs-on: macos-12
    strategy:
      matrix:
        backend: [llama-cpp, transformers, diffusers]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        
    - name: Set up Go 1.21
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: false
        
    - name: Install dependencies
      run: |
        brew install protobuf grpc-tools make cmake libomp llvm
        
    - name: Build ${{ matrix.backend }} backend for Intel
      run: |
        export CGO_ENABLED=0
        export GOOS=darwin
        export GOARCH=amd64
        export GOAMD64=v1
        
        # Build specific backend
        make protogen-go
        BACKEND=${{ matrix.backend }} make build-darwin-go-backend
        
    - name: Upload backend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.backend }}-darwin-intel
        path: backend-images/${{ matrix.backend }}.tar
        retention-days: 30